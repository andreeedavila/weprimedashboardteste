<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WePrime | Fluxo de Caixa</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb; padding:20px; }
.container { max-width:1200px; margin:auto; }

.cards { display:flex; gap:8px; margin:10px 0; }
.card {
 background:#1e293b;
 padding:8px;
 border-radius:6px;
 flex:1;
 font-size:12px;
 border-left:3px solid #d4af37;
 text-align:center;
}

input, button, select {
 padding:8px;
 margin:5px;
 background:#1e293b;
 color:white;
 border:1px solid #334155;
}

table { width:100%; border-collapse:collapse; margin-top:20px; }
td, th { padding:8px; border-bottom:1px solid #334155; text-align:center; }

.negativo { color:#ef4444; }

canvas { max-height:220px; }

.modal {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.8);
 display:none;
 justify-content:center;
 align-items:center;
}
.modal-content {
 background:#1e293b;
 padding:20px;
 border-radius:10px;
 max-height:80%;
 overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Fluxo de Caixa - WePrime</h2>

<div style="display:flex; gap:20px;">

<div style="flex:2;">
<h3>Bancos</h3>
<div id="bancos"></div>
<button onclick="addBanco()">+ Banco</button>

<h3>Filtrar por Banco</h3>
<select id="filtroBanco">
<option value="todos">Todos</option>
</select>
</div>

<div style="flex:1;">
<h3>Resumo do Período</h3>
<div class="card">
Recebido<br><b id="resR">R$0</b><br>
Pago<br><b id="resP">R$0</b><br>
Saldo<br><b id="resS">R$0</b>
</div>
</div>

</div>

<h3>Período</h3>
De: <input type="date" id="dataInicio">
Até: <input type="date" id="dataFim">

<h3>Upload</h3>
Receber: <input type="file" id="fileReceber">
Pagar: <input type="file" id="filePagar">

<br>
<button onclick="processar()">Gerar Dashboard</button>
<button onclick="exportar()">Exportar Imagem</button>

<div class="cards">
<div class="card">Recebido<br><b id="totalR">R$0</b></div>
<div class="card">Pago<br><b id="totalP">R$0</b></div>
<div class="card">Saldo<br><b id="saldoResumo">R$0</b></div>
</div>

<canvas id="graf1"></canvas>
<canvas id="graf2"></canvas>

<table>
<thead>
<tr>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>
<th>Saldo</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

function moeda(v){
 return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
}

function normalizar(txt){
 return String(txt).toLowerCase()
 .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function addBanco(){
 let div=document.createElement("div");

 div.innerHTML=`
 <input placeholder="Banco" oninput="atualizarFiltro()">
 <input placeholder="Saldo" oninput="formatarMoeda(this)">
 <input placeholder="Limite" oninput="formatarMoeda(this)">
 <button onclick="this.parentElement.remove(); atualizarFiltro()">X</button>
 `;

 bancos.appendChild(div);
}

function atualizarFiltro(){
 let select = filtroBanco;
 select.innerHTML = `<option value="todos">Todos</option>`;

 let linhas = bancos.children;

 for(let l of linhas){
  let nome = l.children[0].value;
  if(nome){
   let opt = document.createElement("option");
   opt.value = nome;
   opt.text = nome;
   select.appendChild(opt);
  }
 }
}

function parseMoeda(valor){
 if(!valor) return 0;
 let negativo = valor.includes("-");
 let num = valor.replace(/[^\d]/g,"");
 num = Number(num)/100;
 return negativo ? -num : num;
}

function formatarMoeda(input){
 let v=input.value.replace(/\D/g,"");
 v=(v/100).toFixed(2)+"";
 v=v.replace(".",",");
 v=v.replace(/\B(?=(\d{3})+(?!\d))/g,".");
 input.value="R$ "+v;
}

function saldoInicial(){
 let total=0;
 let filtro = filtroBanco.value;

 let linhas=bancos.children;

 for(let l of linhas){
  let nome = l.children[0].value;

  if(filtro !== "todos" && nome !== filtro) continue;

  let saldo=parseMoeda(l.children[1].value||"0");
  let limite=parseMoeda(l.children[2].value||"0");

  total+=saldo+limite;
 }

 return total;
}

function encontrarCabecalho(array){
 for(let i=0;i<array.length;i++){
  let linha=array[i].map(c=>normalizar(c));
  if(linha.some(c=>c.includes("venc")||c.includes("previs"))){
   return i;
  }
 }
 return 0;
}

function mapear(headers){
 let map={};

 headers.forEach((h,i)=>{
  let t=normalizar(h);

  if(t.includes("venc")||t.includes("previs")) map.data=i;
  if(t.includes("valor")) map.valor=i;
  if(t.includes("nome")||t.includes("fantasia")) map.nome=i;
  if(t.includes("nota")||t.includes("doc")||t.includes("numero")) map.doc=i;
 });

 return map;
}

function tratar(array){

 let cab=encontrarCabecalho(array);
 let headers=array[cab];
 let dados=array.slice(cab+1);

 let map=mapear(headers);

 let res=[];

 dados.forEach(l=>{

  let data=l[map.data];
  let valor=l[map.valor];

  if(!data || !valor) return;

  let d;
  if(typeof data==="number"){
   d=new Date((data-25569)*86400*1000);
  } else {
   d=new Date(data);
  }

  res.push({
   data:d.toISOString().split("T")[0],
   valor:Number(valor),
   nome:l[map.nome]||"",
   doc:l[map.doc]||""
  });

 });

 return res;
}

function ler(file){
 return new Promise(resolve=>{
  let reader=new FileReader();
  reader.onload=e=>{
   let wb=XLSX.read(e.target.result,{type:'array'});
   let sheet=wb.Sheets[wb.SheetNames[0]];
   let arr=XLSX.utils.sheet_to_json(sheet,{header:1});
   resolve(arr);
  };
  reader.readAsArrayBuffer(file);
 });
}

async function processar(){

 let inicio=dataInicio.value;
 let fim=dataFim.value;

 let r=await ler(fileReceber.files[0]);
 let p=await ler(filePagar.files[0]);

 let receber=tratar(r);
 let pagar=tratar(p);

 let saldo=saldoInicial();

 tabela.innerHTML="";

 let totalR=0,totalP=0;

 let labels=[], entradas=[], saidas=[], saldos=[];

 let d=new Date(inicio);

 while(d<=new Date(fim)){

  let data=d.toISOString().split("T")[0];

  let ent=receber.filter(x=>x.data==data);
  let sai=pagar.filter(x=>x.data==data);

  let vEnt=ent.reduce((a,b)=>a+b.valor,0);
  let vSai=sai.reduce((a,b)=>a+b.valor,0);

  totalR+=vEnt;
  totalP+=vSai;

  saldo+=vEnt-vSai;

  let tr=document.createElement("tr");

  tr.innerHTML=`
  <td>${data}</td>
  <td>${moeda(vEnt)}</td>
  <td>${moeda(vSai)}</td>
  <td class="${saldo<0?'negativo':''}">${moeda(saldo)}</td>`;

  tr.ondblclick=()=>{
   modal.style.display="flex";

   let lista = ent.length > 0 ? ent : sai;

   modalContent.innerHTML =
   "<h3>Detalhes</h3>" +
   lista.map(x=>`
    <p>${x.nome || "-"} | ${x.doc || "-"} | ${moeda(x.valor)}</p>
   `).join("");
  };

  tabela.appendChild(tr);

  labels.push(data);
  entradas.push(vEnt);
  saidas.push(vSai);
  saldos.push(saldo);

  d.setDate(d.getDate()+1);
 }

 totalR.innerText=moeda(totalR);
 totalP.innerText=moeda(totalP);
 saldoResumo.innerText=moeda(totalR-totalP);

 resR.innerText=moeda(totalR);
 resP.innerText=moeda(totalP);
 resS.innerText=moeda(totalR-totalP);

 if(window.chart1) chart1.destroy();
 if(window.chart2) chart2.destroy();

 window.chart1 = new Chart(graf1,{
  type:'line',
  data:{labels,datasets:[
   {label:"Entradas",data:entradas},
   {label:"Saídas",data:saidas}
  ]}
 });

 window.chart2 = new Chart(graf2,{
  type:'line',
  data:{labels,datasets:[
   {label:"Saldo",data:saldos}
  ]}
 });

}

function exportar(){
 html2canvas(document.body).then(canvas=>{
  let link=document.createElement("a");
  link.download="fluxo_weprime.png";
  link.href=canvas.toDataURL();
  link.click();
 });
}

modal.onclick=()=>modal.style.display="none";

</script>

</body>
</html>
