<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WePrime | Fluxo de Caixa</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>
body { font-family: Arial; background:#0f172a; color:#e5e7eb; padding:20px; }
.container { max-width:1200px; margin:auto; }

.card {
 background:#1e293b;
 padding:10px;
 border-radius:8px;
 font-size:13px;
 border-left:3px solid #d4af37;
 margin-bottom:10px;
}

input, button {
 padding:8px;
 margin:5px;
 background:#1e293b;
 color:white;
 border:1px solid #334155;
}

table { width:100%; border-collapse:collapse; margin-top:20px; }
td, th { padding:8px; border-bottom:1px solid #334155; text-align:center; cursor:pointer; }

.negativo { color:#ef4444; }

canvas { max-height:160px; margin-top:10px; }

/* Modal */
#modal {
 display:none;
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
}
.modal-box{
 background:#1e293b;
 padding:20px;
 border-radius:10px;
 max-height:80%;
 overflow:auto;
 width:400px;
}
</style>
</head>

<body>

<div class="container" id="areaExport">

<h2 id="tituloPeriodo">DASHBOARD WEPRIME</h2>

<div style="display:flex; gap:20px;">

<div style="flex:2;">
<h3>Bancos</h3>
<div id="bancos"></div>
<button onclick="addBanco()">+ Banco</button>
</div>

<div style="flex:1;">
<h3 id="tituloResumo">Previsões do Período</h3>

<div class="card">
Pagar<br><b id="prevPagar">R$0</b><br>
Receber<br><b id="prevReceber">R$0</b><br>
Resultado<br><b id="prevResultado">R$0</b><br>
Saldo Final<br><b id="prevSaldo">R$0</b><br>
Limite Disponível<br><b id="prevLimite">R$0</b>
</div>

</div>

</div>

<h3>Período</h3>
De: <input type="date" id="dataInicio">
Até: <input type="date" id="dataFim">

<h3>Upload</h3>
Receber: <input type="file" id="fileReceber">
Pagar: <input type="file" id="filePagar">

<br>
<button onclick="processar()">Gerar</button>
<button onclick="exportar()">Exportar</button>

<canvas id="graf1"></canvas>
<canvas id="graf2"></canvas>

<table>
<thead>
<tr>
<th>Data</th>
<th>Entrada</th>
<th>Saída</th>
<th>Saldo</th>
<th>Limite Disponível</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<!-- Modal -->
<div id="modal">
 <div class="modal-box">
  <h3 id="modalTitulo"></h3>
  <div id="modalConteudo"></div>
 </div>
</div>

<script>

function moeda(v){
 return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
}

function formatarDataBR(data){
 let d = new Date(data);
 return String(d.getDate()).padStart(2,'0')+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+d.getFullYear();
}

function formatarMoeda(input){
 let negativo=input.value.startsWith("-");
 let v=input.value.replace(/[^\d]/g,"");
 if(v===""){ input.value=negativo?"-":""; return;}
 v=(v/100).toFixed(2).replace(".",",");
 v=v.replace(/\B(?=(\d{3})+(?!\d))/g,".");
 input.value=(negativo?"-R$ ":"R$ ")+v;
}

function parseMoeda(v){
 if(!v) return 0;
 let neg=v.includes("-");
 let n=v.replace(/[^\d]/g,"");
 n=Number(n)/100;
 return neg?-n:n;
}

function addBanco(){
 let div=document.createElement("div");
 div.innerHTML=`
 <input placeholder="Banco">
 <input placeholder="Saldo" oninput="formatarMoeda(this)">
 <input placeholder="Limite" oninput="formatarMoeda(this)">
 <button onclick="this.parentElement.remove()">X</button>`;
 bancos.appendChild(div);
}

function baseFinanceira(){
 let saldo=0, limite=0;
 for(let b of bancos.children){
  saldo+=parseMoeda(b.children[1].value);
  limite+=parseMoeda(b.children[2].value);
 }
 return {saldo, limite};
}

function normalizar(txt){
 return String(txt).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function encontrarCabecalho(arr){
 for(let i=0;i<arr.length;i++){
  let l=arr[i].map(c=>normalizar(c));
  if(l.some(c=>c.includes("venc")||c.includes("previs"))) return i;
 }
 return 0;
}


function mapear(headers){
 let m={};
 headers.forEach((h,i)=>{
  let t=normalizar(h);

  if(t.includes("venc")||t.includes("previs")) m.data=i;
  if(t.includes("valor")) m.valor=i;
  if(t.includes("nome")||t.includes("fantasia")) m.nome=i;

  // 🔥 AJUSTE EXATO PELO PRINT
  if(t.includes("nota fiscal") || t.includes("cupom")) m.nf=i;
  if(t.includes("numero do documento") || t.includes("número do documento")) m.doc=i;
 });
 return m;
}



function tratar(arr){
 let cab=encontrarCabecalho(arr);
 let headers=arr[cab];
 let dados=arr.slice(cab+1);
 let map=mapear(headers);

 let res=[];
 dados.forEach(l=>{
  let data=l[map.data];
  let valor=l[map.valor];
  if(!data||!valor) return;

  let d=typeof data==="number"
   ? new Date((data-25569)*86400*1000)
   : new Date(data);

  let nf = (map.nf !== undefined) ? l[map.nf] : "";
  let doc = (map.doc !== undefined) ? l[map.doc] : "";

  let documento = "";
  if(nf && String(nf).trim() !== "") documento = String(nf).replace(/^0+/, '');
  else if(doc && String(doc).trim() !== "") documento = doc;
  else documento = "NÃO PREENCHIDO";

  res.push({
   data:d.toISOString().split("T")[0],
   valor:Number(valor),
   nome:l[map.nome]||"",
   doc:documento
  });
 });

 return res;
}


function ler(file){
 return new Promise(r=>{
  let fr=new FileReader();
  fr.onload=e=>{
   let wb=XLSX.read(e.target.result,{type:'array'});
   let sh=wb.Sheets[wb.SheetNames[0]];
   r(XLSX.utils.sheet_to_json(sh,{header:1}));
  };
  fr.readAsArrayBuffer(file);
 });
}

// ===== MODAL =====



function abrirDetalhe(lista, tipo){
 modal.style.display="flex";
 modalTitulo.innerText=tipo;

 let total = lista.reduce((a,b)=>a+b.valor,0);

 let header = tipo === "Contas a Receber"
   ? "<tr><th>CLIENTE</th><th>DOCUMENTO</th><th>VALOR</th></tr>"
   : "<tr><th>FORNECEDOR</th><th>DOCUMENTO</th><th>VALOR</th></tr>";

 let linhas = lista.map(x=>`
   <tr>
     <td>${x.nome||"-"}</td>
     <td>${x.doc||"-"}</td>
     <td>${moeda(x.valor)}</td>
   </tr>
 `).join("");

 modalConteudo.innerHTML = lista.length === 0
 ? "<p>Sem registros</p>"
 : `
   <table style="width:100%; border-collapse:collapse; margin-top:10px;">
     ${header}
     ${linhas}
   </table>
   <hr>
   <b>Total: ${moeda(total)}</b>
 `;
}

modal.onclick = () => modal.style.display="none";

// ===== PROCESSAR =====
async function processar(){

 let r=await ler(fileReceber.files[0]);
 let p=await ler(filePagar.files[0]);

 let receber=tratar(r);
 let pagar=tratar(p);

 let inicio=new Date(dataInicio.value);
 let fim=new Date(dataFim.value);

 let base=baseFinanceira();
 let saldo=base.saldo;
 let limiteTotal = base.limite + (base.saldo<0 ? Math.abs(base.saldo) : 0);

 let totalRec=0, totalPag=0;

 tabela.innerHTML="";

 let labels=[], entradas=[], saidas=[], saldos=[];

 let d=new Date(inicio);

 while(d<=fim){

  let data=d.toISOString().split("T")[0];

  let entList=receber.filter(x=>x.data==data);
  let saiList=pagar.filter(x=>x.data==data);

  let vEnt=entList.reduce((a,b)=>a+b.valor,0);
  let vSai=saiList.reduce((a,b)=>a+b.valor,0);

  totalRec+=vEnt;
  totalPag+=vSai;

  saldo+=vEnt-vSai;

  let limiteDisponivel = limiteTotal - Math.abs(saldo);
  if(limiteDisponivel < 0) limiteDisponivel = 0;

  let tr=document.createElement("tr");

  let tdData=document.createElement("td");
  tdData.innerText=formatarDataBR(data);

  let tdEnt=document.createElement("td");
  tdEnt.innerText=moeda(vEnt);
  tdEnt.onclick=()=>abrirDetalhe(entList,"Contas a Receber");

  let tdSai=document.createElement("td");
  tdSai.innerText=moeda(vSai);
  tdSai.onclick=()=>abrirDetalhe(saiList,"Contas a Pagar");

  let tdSaldo=document.createElement("td");
  tdSaldo.innerText=moeda(saldo);
  if(saldo<0) tdSaldo.classList.add("negativo");

  let tdLimite=document.createElement("td");
  tdLimite.innerText=moeda(limiteDisponivel);

  tr.appendChild(tdData);
  tr.appendChild(tdEnt);
  tr.appendChild(tdSai);
  tr.appendChild(tdSaldo);
  tr.appendChild(tdLimite);

  tabela.appendChild(tr);

  labels.push(formatarDataBR(data));
  entradas.push(vEnt);
  saidas.push(vSai);
  saldos.push(saldo);

  d.setDate(d.getDate()+1);
 }

 let resultado = totalRec - totalPag;
 let saldoFinal = base.saldo + resultado;
 let limiteFinal = limiteTotal - Math.abs(saldoFinal);
 if(limiteFinal < 0) limiteFinal = 0;

 prevPagar.innerText = moeda(totalPag);
 prevReceber.innerText = moeda(totalRec);
 prevResultado.innerText = moeda(resultado);
 prevSaldo.innerText = moeda(saldoFinal);
 prevLimite.innerText = moeda(limiteFinal);

 tituloResumo.innerText = "Previsões de " + dataInicio.value.split("-").reverse().join("-") + " até " + dataFim.value.split("-").reverse().join("-");
 tituloPeriodo.innerText = "DASHBOARD WEPRIME ("+dataInicio.value.split("-").reverse().join("-")+" até "+dataFim.value.split("-").reverse().join("-")+")";

 if(window.c1) c1.destroy();
 if(window.c2) c2.destroy();

 window.c1=new Chart(graf1,{type:'line',data:{labels,datasets:[
  {label:"Entradas",data:entradas},
  {label:"Saídas",data:saidas}
 ]}});

 window.c2=new Chart(graf2,{type:'line',data:{labels,datasets:[
  {label:"Saldo",data:saldos}
 ]}});
}

function exportar(){
 html2canvas(document.getElementById("areaExport")).then(c=>{
  let a=document.createElement("a");
  a.href=c.toDataURL();
  a.download="fluxo.png";
  a.click();
 });
}

</script>

</body>
</html>
